<svg viewBox="0 0 900 26" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="divider">
  <defs>
    <filter id="dglow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="13" x2="900" y2="13" stroke="#232323" stroke-width="1" stroke-dasharray="900" stroke-dashoffset="900">
    <animate attributeName="stroke-dashoffset" from="900" to="0" dur="1s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
  </line>
  <g fill="#6b5626" opacity="0">
    <circle cx="225" cy="13" r="1.8"/>
    <circle cx="450" cy="13" r="2.2"/>
    <circle cx="675" cy="13" r="1.8"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
  </g>
  <circle r="2" fill="#f3d896" filter="url(#dglow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.3s" fill="freeze"/>
    <animateMotion dur="6s" begin="1.3s" repeatCount="indefinite" path="M 0 13 L 900 13"/>
  </circle>
</svg>
