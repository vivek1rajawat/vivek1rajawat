<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Signature banner">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A15A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5f1e8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C9A15A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="899" height="219" fill="none" stroke="#232323" stroke-width="1"/>

  <!-- corner screw-holes, echoes the contribution-circuit graphic -->
  <g stroke="#232323" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="14" cy="14" r="2.5"/>
    <circle cx="886" cy="14" r="2.5"/>
    <circle cx="14" cy="206" r="2.5"/>
    <circle cx="886" cy="206" r="2.5"/>
  </g>

  <!-- faint IC-chip glyph, bottom-left -->
  <g stroke="#232323" stroke-width="1" fill="none" opacity="0.35">
    <rect x="26" y="188" width="20" height="13" rx="1.5"/>
    <line x1="29" y1="188" x2="29" y2="184"/>
    <line x1="36" y1="188" x2="36" y2="184"/>
    <line x1="43" y1="188" x2="43" y2="184"/>
    <line x1="29" y1="201" x2="29" y2="205"/>
    <line x1="36" y1="201" x2="36" y2="205"/>
    <line x1="43" y1="201" x2="43" y2="205"/>
  </g>

  <!-- one-time sheen sweep across the whole banner -->
  <rect x="-300" y="0" width="260" height="220" fill="url(#sheen)">
    <animate id="sheenAnim" attributeName="x" from="-300" to="940" dur="3s" begin="2.5s;sheenAnim.end+4s" fill="freeze"/>
  </rect>

  <text x="450" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="4" fill="#C9A15A" opacity="0">SOFTWARE ENGINEER &#8212; MERN &amp; AI SYSTEMS
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.08;1" dur="1.2s" begin="0.1s" fill="freeze"/>
  </text>

  <text x="450" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="3" fill="#f5f1e8" opacity="0">VIVEK RAJAWAT
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.1;1" dur="1.3s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- central divider -->
  <line x1="450" y1="144" x2="450" y2="144" stroke="#C9A15A" stroke-width="1.5">
    <animate attributeName="x1" from="450" to="390" dur="0.9s" begin="1.1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="x2" from="450" to="510" dur="0.9s" begin="1.1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="3.2s" begin="2s" repeatCount="indefinite"/>
  </line>

  <!-- flanking circuit traces, drawn on after the divider settles -->
  <g stroke="#6b5626" stroke-width="1">
    <line x1="510" y1="144" x2="680" y2="144" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" from="170" to="0" dur="0.6s" begin="1.7s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    </line>
    <line x1="390" y1="144" x2="220" y2="144" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" from="170" to="0" dur="0.6s" begin="1.7s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    </line>
  </g>

  <!-- solder pads along the traces -->
  <g fill="#6b5626" opacity="0">
    <circle cx="595" cy="144" r="2.1"/>
    <circle cx="305" cy="144" r="2.1"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </g>

  <!-- glowing terminals at the trace ends, pulsing like an active pad -->
  <circle cx="680" cy="144" r="2.8" fill="#C9A15A" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" begin="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="144" r="2.8" fill="#C9A15A" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- traveling current pulses, shooting outward along each trace -->
  <circle r="1.8" fill="#f3d896" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
    <animateMotion dur="2.2s" begin="2.6s" repeatCount="indefinite" path="M 510 144 L 680 144"/>
  </circle>
  <circle r="1.8" fill="#f3d896" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.9s" fill="freeze"/>
    <animateMotion dur="2.4s" begin="2.9s" repeatCount="indefinite" path="M 390 144 L 220 144"/>
  </circle>

  <text x="450" y="176" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" letter-spacing="1.5" fill="#8a8a86" opacity="0">REACT &#183; NODE.JS &#183; MONGODB &#183; LLM AGENTS &#183; AWS
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.1;1" dur="1s" begin="1.9s" fill="freeze"/>
  </text>
</svg>
